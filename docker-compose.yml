version: '3.8'

services:
  mongo:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  ms-event-manager:
    build: ./ms-event-manager
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/eventosdb

  ms-ticket-manager:
    build: ./ms-ticket-manager
    ports:
      - "8081:8081"
    depends_on:
      - mongo
      - rabbitmq
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/ticketsdb
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672

volumes:
  mongo_data:
